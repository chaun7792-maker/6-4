<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh Sửa Thiệp</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 90%; max-width: 500px; }
        h1 { text-align: center; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input[type="text"], textarea, select { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        .btn-container { text-align: center; margin-top: 1.5rem; }
        button { padding: 0.75rem 1.5rem; background-color: #ff4d6d; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        button:hover { background-color: #ff758f; }
        #link-container { display: none; margin-top: 1rem; text-align: center; }
        #generated-link { display: block; padding: 10px; border: 1px solid #eee; background-color: #f9f9f9; word-break: break-all; margin-bottom: 10px; }
        .qr-placeholder { font-style: italic; color: #777; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Editor</h1>
        <form id="card-form">
            <div class="form-group">
                <label for="recipient">Tên Người Nhận (ngăn cách bằng dấu phẩy):</label>
                <input type="text" id="recipient" placeholder="Ví dụ: Nguyễn Văn A, Trần Thị B, ..." required>
            </div>
            <div class="form-group">
                <label for="title">Tiêu Đề Thiệp:</label>
                <input type="text" id="title" placeholder="Ví dụ: Chúc Mừng!" required>
            </div>
            <div class="form-group">
                <label for="content">Nội Dung Thiệp:</label>
                <textarea id="content" placeholder="Nhập lời chúc..." required></textarea>
            </div>
            <div class="form-group">
                <label for="music">Chọn Nhạc Nền:</label>
                <select id="music">
                    <option value="https://www.bensound.com/bensound-music/bensound-love.mp3">Bản Nhạc 1 (Lãng mạn)</option>
                    <option value="https://www.bensound.com/bensound-music/bensound-sunny.mp3">Bản Nhạc 2 (Vui tươi)</option>
                </select>
            </div>
            <div class="btn-container">
                <button type="submit">Tạo Thiệp</button>
            </div>
        </form>
        <div id="link-container">
            <label>Link thiệp của bạn:</label>
            <a href="#" id="generated-link" target="_blank"></a>
            <p><strong>Cách tạo mã QR:</strong> Copy link trên và dán vào một trang web tạo mã QR (như <a href="https://me-qr.com/vi" target="_blank">me-qr.com</a>).</p>
        </div>
    </div>

    <script>
        document.getElementById('card-form').addEventListener('submit', function(e) {
            e.preventDefault();

            // Lấy dữ liệu từ form
            const recipient = encodeURIComponent(document.getElementById('recipient').value);
            const title = encodeURIComponent(document.getElementById('title').value);
            const content = encodeURIComponent(document.getElementById('content').value);
            const music = encodeURIComponent(document.getElementById('music').value);

            // Tạo query string
            const queryString = `r=${recipient}&t=${title}&c=${content}&m=${music}`;
            
            // Lấy đường dẫn hiện tại và chuyển thành link thiệp
            const currentPath = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
            const generatedLink = `${currentPath}/thiep.html?${queryString}`;

            // Hiển thị link
            document.getElementById('generated-link').href = generatedLink;
            document.getElementById('generated-link').innerText = generatedLink;
            document.getElementById('link-container').style.display = 'block';
        });
    </script>
</body>
</html>
